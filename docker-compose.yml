services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PostgreSql=Host=postgres;Database=mcp_gateway;Username=mcp;Password=mcp
      - AzureStorage__ConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - Otel__Exporter__Otlp__Endpoint=http://jaeger:4318
      - EntraId__TenantId=test-tenant-id
      - EntraId__ClientId=test-client-id
      - EntraId__ClientSecret=test-client-secret
      - EntraId__JwksUri=https://login.microsoftonline.com/test-tenant/discovery/v2.0/keys
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=mcp
      - POSTGRES_PASSWORD=mcp
      - POSTGRES_DB=mcp_gateway
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10001:10001"  # Queue
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10001"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  azurite_data: